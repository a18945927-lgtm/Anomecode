<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anomecode</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#070b14;
  color:#eaf1ff;
  overflow-x:hidden;
}

/* BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:0;
}

.content{position:relative;z-index:2}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:64px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 30px;
  background:rgba(10,15,25,0.7);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:600;
}

.nav a{
  margin-left:16px;
  text-decoration:none;
  color:#9fb3c9;
}
.nav a:hover{color:white}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo{
  width:120px;
  margin-bottom:20px;
  filter:drop-shadow(0 0 30px rgba(78,161,255,0.4));
}

h1{font-size:64px;margin:0}

.sub{
  margin-top:14px;
  color:#9fb3c9;
  max-width:600px;
}

/* SYSTEM */
.system{
  padding:80px 20px;
  max-width:1000px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
}

.card{
  padding:16px;
  border-radius:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
}

/* SERVERS */
.servers{
  padding:80px 20px;
  max-width:1000px;
  margin:auto;
}

.server{
  display:flex;
  gap:12px;
  align-items:center;
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  margin-bottom:12px;
  cursor:pointer;
  transition:0.2s;
}

.server:hover{
  transform:translateY(-4px);
  border-color:#4ea1ff;
}

.head{
  width:64px;
  height:64px;
  border-radius:12px;
}

.name{font-weight:600}
.ip{font-size:12px;color:#9fb3c9}

/* SERVER PAGE */
#serverPage{
  position:fixed;
  inset:0;
  background:#070b14;
  z-index:999;
  display:none;
  overflow:auto;
}

.sp-wrap{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.sp-back{
  color:#4ea1ff;
  cursor:pointer;
  margin-bottom:20px;
}

.sp-header{
  display:flex;
  gap:16px;
  align-items:center;
}

.sp-header img{
  width:80px;
  border-radius:16px;
}

#sp-name{
  font-size:28px;
  font-weight:600;
}

#sp-short{
  color:#9fb3c9;
}

#sp-desc{
  margin-top:20px;
  color:#9fb3c9;
}

#sp-images{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:12px;
}

#sp-images img{
  width:100%;
  border-radius:12px;
  transition:0.2s;
}

#sp-images img:hover{
  transform:scale(1.03);
}

/* FOOTER */
.footer{
  padding:60px;
  text-align:center;
  color:#7f8ea8;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="content">

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <svg width="26" viewBox="0 0 100 100">
      <polygon points="50,10 90,90 10,90" fill="#4ea1ff"/>
    </svg>
    ANOMECODE
  </div>

  <div class="nav">
    <a href="#">Home</a>
    <a href="#">System</a>
    <a href="#">Servers</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <svg class="logo" viewBox="0 0 100 100">
    <polygon points="50,10 90,90 10,90" fill="#4ea1ff"/>
    <polygon points="50,25 75,85 25,85" fill="#070b14"/>
  </svg>

  <h1>Anomecode</h1>
  <div class="sub">Платформа визуализации Minecraft проектов</div>
</div>

<!-- SYSTEM -->
<div class="system">
  <h2>System</h2>

  <div class="grid">
    <div class="card">Node-based architecture</div>
    <div class="card">Minimal interface</div>
    <div class="card">Scalable structure</div>
    <div class="card">Independent platform</div>
  </div>
</div>

<!-- SERVERS -->
<div class="servers">
  <h2>Servers</h2>
  <div id="servers"></div>
</div>

<div class="footer">Anomecode · 2026</div>

</div>

<!-- SERVER PAGE -->
<div id="serverPage">
  <div class="sp-wrap">

    <div class="sp-back" onclick="closeServer()">← Назад</div>

    <div class="sp-header">
      <img id="sp-icon">
      <div>
        <div id="sp-name"></div>
        <div id="sp-short"></div>
      </div>
    </div>

    <div id="sp-desc"></div>
    <div id="sp-images"></div>

  </div>
</div>

<script>

/* SERVERS DATA */
const servers=[
{
  name:"Hypixel Node",
  ip:"mc.hypixel.net",
  icon:"https://mc-heads.net/avatar/steve/64",
  desc:"Крупный игровой узел сети.",
  images:[
    "https://picsum.photos/500/300?1",
    "https://picsum.photos/500/300?2"
  ]
},
{
  name:"Mineplex Node",
  ip:"mc.mineplex.com",
  icon:"https://mc-heads.net/avatar/creeper/64",
  desc:"Игровые режимы и PvP.",
  images:[
    "https://picsum.photos/500/300?3"
  ]
}
];

/* RENDER */
function render(){
  const root=document.getElementById("servers");
  root.innerHTML="";

  servers.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="server";

    div.onclick=()=>openServer(i);

    div.innerHTML=`
      <img class="head" src="${s.icon}">
      <div>
        <div class="name">${s.name}</div>
        <div class="ip">${s.ip}</div>
      </div>
    `;

    root.appendChild(div);
  });
}

/* OPEN PAGE */
function openServer(i){
  const s=servers[i];

  document.getElementById("serverPage").style.display="block";

  document.getElementById("sp-name").innerText=s.name;
  document.getElementById("sp-short").innerText=s.ip;
  document.getElementById("sp-desc").innerText=s.desc;
  document.getElementById("sp-icon").src=s.icon;

  const box=document.getElementById("sp-images");
  box.innerHTML="";

  s.images.forEach(img=>{
    const im=document.createElement("img");
    im.src=img;
    box.appendChild(im);
  });
}

function closeServer(){
  document.getElementById("serverPage").style.display="none";
}

/* BG */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
  p.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    vx:(Math.random()-0.5)*0.4,
    vy:(Math.random()-0.5)*0.4
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  for(let i of p){
    i.x+=i.vx;
    i.y+=i.vy;

    if(i.x<0||i.x>c.width)i.vx*=-1;
    if(i.y<0||i.y>c.height)i.vy*=-1;

    ctx.fillStyle="#4ea1ff";
    ctx.fillRect(i.x,i.y,2,2);
  }

  requestAnimationFrame(draw);
}

draw();
render();

</script>

</body>
</html>
