<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anomecode System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070b14;
  color:white;
  overflow-x:hidden;
}

/* ===== AUTH ===== */
.auth{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  width:320px;
  padding:20px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
}

input{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
}

button{
  width:100%;
  margin-top:12px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4ea1ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* ===== MAIN ===== */
.main{display:none}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:14px 30px;
  background:rgba(10,15,25,0.7);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav a{
  margin-left:12px;
  color:#9bb0d1;
  text-decoration:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}

.hero h1{
  font-size:48px;
}

/* SERVERS */
.servers{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
  padding:40px;
}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:14px;
  display:flex;
  gap:10px;
  align-items:center;
}

.head{
  width:64px;
  height:64px;
  border-radius:10px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#888;
}

/* ARTICLES */
.articles{
  padding:40px;
}

.article{
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}

/* CREATOR */
.creator{
  padding:40px;
}

.creator-box{
  display:flex;
  gap:15px;
  align-items:center;
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
}

.creator-box img{
  width:80px;
  border-radius:12px;
}

/* GRAPH */
.graph{
  margin:40px;
  height:200px;
  position:relative;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
}

.node{
  width:8px;
  height:8px;
  background:#4ea1ff;
  border-radius:50%;
  position:absolute;
}

/* BADGE */
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:8px;
  background:rgba(78,161,255,0.15);
  border:1px solid #4ea1ff;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth" id="auth">
  <div class="box">
    <h3 id="title">Login</h3>

    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">

    <button onclick="login()">Continue</button>
    <button onclick="toggle()" style="background:#222">Switch</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="topbar">
    <div><b>Anomecode</b></div>
    <div class="nav">
      <a href="#servers">Servers</a>
      <a href="#articles">Articles</a>
      <a href="#creator">Creator</a>
    </div>
  </div>

  <div class="hero">
    <h1>ANOMECODE SYSTEM</h1>
    <div class="badge" id="role">USER</div>
  </div>

  <!-- SERVERS -->
  <div class="servers" id="servers"></div>

  <!-- ARTICLES -->
  <div class="articles" id="articles">
    <h2>Articles</h2>
    <div class="article">Server Spoof / Resource Pack</div>
    <div class="article">Freeze / Blink System</div>
    <div class="article">No Render Modules</div>
  </div>

  <!-- CREATOR -->
  <div class="creator" id="creator">
    <h2>Creator</h2>

    <div class="creator-box">
      <img src="https://mc-heads.net/avatar/steve/128">
      <div>
        <b>Sneaks</b><br>
        System Owner / Architect
      </div>
    </div>
  </div>

  <!-- GRAPH -->
  <div class="graph">
    <div class="node" style="top:50px;left:80px"></div>
    <div class="node" style="top:120px;left:160px"></div>
    <div class="node" style="top:70px;left:240px"></div>
    <div class="node" style="top:140px;left:300px"></div>
  </div>

</div>

<script>

let mode="login";

const OWNER={
  u:"Sneaks",
  p:"ForCloud"
};

function toggle(){
  mode = mode==="login" ? "reg" : "login";
  document.getElementById("title").innerText = mode;
}

function login(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;

  if(u===OWNER.u && p===OWNER.p){
    start("OWNER");
    return;
  }

  start("USER");
}

function start(role){

  document.getElementById("auth").style.display="none";
  document.getElementById("main").style.display="block";

  document.getElementById("role").innerText=role;

  let servers=[
    "Hypixel Node",
    "Mineplex Node",
    "Alpha Node",
    "Beta Node",
    "Gamma Node"
  ];

  let grid=document.getElementById("servers");
  grid.innerHTML="";

  servers.forEach(s=>{
    grid.innerHTML+=`
      <div class="card">
        <img class="head" src="https://mc-heads.net/avatar/steve/64">
        <div>
          <b>${s}</b><br>
          <div style="display:flex;gap:6px;align-items:center">
            <div class="dot"></div> UNKNOWN
          </div>
        </div>
      </div>
    `;
  });

}

</script>

</body>
</html>
