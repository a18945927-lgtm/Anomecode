<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anomecode</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070b14;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(78,161,255,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(78,161,255,0.05), transparent 40%);
  pointer-events:none;
}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 24px;
  background:rgba(10,15,25,0.7);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:100;
}

.brand{
  color:#4ea1ff;
  font-weight:bold;
  letter-spacing:2px;
}

.search{
  flex:1;
  max-width:300px;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  outline:none;
}

.nav a{
  margin-left:12px;
  text-decoration:none;
  color:#9bb0d1;
  font-size:14px;
}

.nav a:hover{
  color:#4ea1ff;
}

/* HERO */
.hero{
  height:75vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo{
  width:150px;
  height:150px;
  position:relative;
  margin-bottom:20px;
}

.ring{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:1px solid rgba(78,161,255,0.25);
  animation:spin 12s linear infinite;
}

.core{
  position:absolute;
  top:50%;
  left:50%;
  width:22px;
  height:22px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#4ea1ff;
  box-shadow:0 0 30px #4ea1ff;
}

h1{
  font-size:56px;
  margin:0;
}

.sub{
  color:#9bb0d1;
}

/* SYSTEM */
.system{
  padding:70px 50px;
}

.system h2{
  font-size:30px;
}

.system p{
  color:#9bb0d1;
  max-width:700px;
  line-height:1.6;
}

.grid{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  padding:16px;
  border-radius:14px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#4ea1ff;
}

/* SERVERS */
.servers{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
  padding:60px;
}

.server{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:14px;
  display:flex;
  gap:12px;
  align-items:center;
  cursor:pointer;
  transition:0.2s;
}

.server:hover{
  transform:translateY(-5px);
  border-color:#4ea1ff;
}

.head{
  width:60px;
  height:60px;
  border-radius:12px;
}

.name{font-weight:bold;}
.ip{font-size:12px;color:#9bb0d1;}

.status{
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:6px;
  font-size:12px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  transition:0.3s;
}

.online{background:#4cff88;}
.offline{background:#ff4c4c;}
.unknown{background:#888;}

.footer{
  padding:60px;
  text-align:center;
  color:#9bb0d1;
  border-top:1px solid rgba(255,255,255,0.08);
}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">ANOMECODE</div>
  <input class="search" placeholder="Search servers..." />
  <div class="nav">
    <a href="#">Home</a>
    <a href="#system">System</a>
    <a href="#servers">Nodes</a>
  </div>
</div>

<div class="hero">
  <div class="logo">
    <div class="ring"></div>
    <div class="core"></div>
  </div>

  <h1>ANOMECODE</h1>
  <div class="sub">Minecraft Network System</div>
</div>

<section class="system" id="system">
  <h2>Network System</h2>
  <p>
    Anomecode — это сеть Minecraft серверов, где каждый сервер является узлом единой цифровой структуры.
  </p>
</section>

<div class="servers" id="servers"></div>

<div class="footer">
  © 2026 Anomecode Network
</div>

<script>

let servers=[
  {name:"Hypixel Node",ip:"mc.hypixel.net",status:"online"},
  {name:"Mineplex Node",ip:"mc.mineplex.com",status:"offline"},
  {name:"Alpha Server",ip:"alpha.local",status:"unknown"},
  {name:"Beta Server",ip:"beta.local",status:"unknown"},
  {name:"Gamma Node",ip:"gamma.local",status:"online"}
];

/* РЕНДЕР */
function render(){
  const grid=document.getElementById("servers");
  grid.innerHTML="";

  servers.forEach((s,i)=>{

    const color = s.status;

    const div=document.createElement("div");
    div.className="server";

    div.innerHTML=`
      <img class="head" src="https://mc-heads.net/avatar/steve/64">

      <div>
        <div class="name">${s.name}</div>
        <div class="ip">${s.ip}</div>

        <div class="status">
          <div class="dot ${color}"></div>
          ${s.status.toUpperCase()}
        </div>
      </div>
    `;

    grid.appendChild(div);
  });
}

/* 🔥 LIVE STATUS UPDATE SYSTEM */
function randomStatus(){
  const states=["online","offline","unknown"];

  servers.forEach(s=>{
    // шанс изменения статуса
    if(Math.random()<0.35){
      s.status=states[Math.floor(Math.random()*states.length)];
    }
  });

  render();
}

/* автообновление */
setInterval(()=>{
  randomStatus();
},3000);

render();

</script>

</body>
</html>
