<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anomecode System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0f1b33, #070b14);
  color:white;
}

/* ===== AUTH ===== */
#auth{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.auth-box{
  width:320px;
  padding:20px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  backdrop-filter:blur(10px);
}

input,select{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  outline:none;
}

button{
  width:100%;
  margin-top:12px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4ea1ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#6bb4ff;
}

/* ===== MAIN ===== */
#main{display:none}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:14px 30px;
  background:rgba(10,15,25,0.7);
  border-bottom:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

.badge{
  padding:6px 10px;
  border-radius:8px;
  background:rgba(78,161,255,0.15);
  border:1px solid #4ea1ff;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:42px;
  letter-spacing:2px;
}

/* SERVERS */
.servers{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
  padding:40px;
}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:14px;
  display:flex;
  gap:12px;
  align-items:center;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#4ea1ff;
}

.head{
  width:60px;
  height:60px;
  border-radius:12px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#888;
}

/* ADMIN */
.admin{
  margin:40px;
  padding:20px;
  border-radius:16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
}

.admin h2{
  margin-top:0;
}

.list-item{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.small-btn{
  width:auto;
  padding:6px 10px;
  font-size:12px;
  background:#ff4e4e;
}
</style>

</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <h3 id="title">Login</h3>

    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">

    <button onclick="login()">Enter</button>
    <button onclick="toggle()" style="background:#222">Switch</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <div class="topbar">
    <div><b>Anomecode</b></div>
    <div class="badge" id="role">USER</div>
  </div>

  <div class="hero">
    <h1>ANOMECODE SYSTEM</h1>
    <p>Network Dashboard</p>
  </div>

  <div class="servers" id="servers"></div>

  <!-- ADMIN -->
  <div class="admin" id="adminPanel" style="display:none">

    <h2>Admin Panel</h2>

    <input id="sname" placeholder="Server name">

    <select id="sstatus">
      <option>ONLINE</option>
      <option>OFFLINE</option>
      <option>UNKNOWN</option>
    </select>

    <button onclick="addServer()">Add Server</button>

    <div id="adminList"></div>

  </div>

</div>

<script>

const OWNER = {u:"Sneaks", p:"ForCloud"};

let mode="login";
let currentUser=null;

let servers = JSON.parse(localStorage.getItem("servers")) || [
  {name:"Hypixel Node", status:"UNKNOWN"},
  {name:"Mineplex Node", status:"UNKNOWN"},
  {name:"Alpha Node", status:"UNKNOWN"},
  {name:"Beta Node", status:"UNKNOWN"},
  {name:"Gamma Node", status:"UNKNOWN"}
];

function toggle(){
  mode = mode==="login" ? "reg" : "login";
  document.getElementById("title").innerText=mode;
}

function login(){

  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;

  if(u===OWNER.u && p===OWNER.p){
    currentUser={name:u,role:"OWNER"};
    enter();
    return;
  }

  let saved=JSON.parse(localStorage.getItem("user"));

  if(saved && saved.u===u && saved.p===p){
    currentUser={name:u,role:"ADMIN"};
    enter();
  } else {
    alert("Wrong login");
  }
}

function enter(){

  document.getElementById("auth").style.display="none";
  document.getElementById("main").style.display="block";

  document.getElementById("role").innerText=currentUser.role;

  renderServers();

  if(currentUser.role==="ADMIN" || currentUser.role==="OWNER"){
    document.getElementById("adminPanel").style.display="block";
  }

  renderAdmin();
}

function renderServers(){

  let g=document.getElementById("servers");
  g.innerHTML="";

  servers.forEach(s=>{
    g.innerHTML+=`
      <div class="card">
        <img class="head" src="https://mc-heads.net/avatar/steve/64">
        <div>
          <b>${s.name}</b><br>
          <div style="display:flex;gap:6px;align-items:center">
            <div class="dot"></div>${s.status}
          </div>
        </div>
      </div>
    `;
  });

}

function renderAdmin(){

  let list=document.getElementById("adminList");
  list.innerHTML="";

  servers.forEach((s,i)=>{
    list.innerHTML+=`
      <div class="list-item">
        ${s.name} (${s.status})
        <button class="small-btn" onclick="remove(${i})">X</button>
      </div>
    `;
  });

}

function addServer(){

  let n=document.getElementById("sname").value;
  let st=document.getElementById("sstatus").value;

  servers.push({name:n,status:st});

  localStorage.setItem("servers",JSON.stringify(servers));

  renderServers();
  renderAdmin();
}

function remove(i){
  servers.splice(i,1);
  localStorage.setItem("servers",JSON.stringify(servers));

  renderServers();
  renderAdmin();
}

</script>

</body>
</html>
