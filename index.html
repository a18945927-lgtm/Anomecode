<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anomecode</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f1b33, #0b1220);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 18px 30px;
  background: #070b14;
  border-bottom: 1px solid #1f2a44;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

/* HERO */
.hero {
  text-align: center;
  padding: 70px 20px;
}

.hero-logo {
  font-size: 50px;
  font-weight: bold;
}

.btn {
  margin-top: 20px;
  padding: 12px 22px;
  background: #4ea1ff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

/* SERVERS */
.section-title {
  text-align: center;
  margin-top: 30px;
}

.servers {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
  padding: 20px;
}

/* CARD */
.card {
  background: #111a2e;
  padding: 12px;
  border-radius: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

/* HEAD */
.head {
  width: 60px;
  height: 60px;
  border-radius: 8px;
}

/* TEXT */
.name {
  font-weight: bold;
}

.desc {
  font-size: 12px;
  color: #9bb0d1;
}

.status {
  font-size: 12px;
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* DOT */
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #888;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #111a2e;
  padding: 20px;
  width: 320px;
  border-radius: 12px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Anomecode</div>
</header>

<section class="hero">
  <div class="hero-logo">ANOMECODE</div>
  <p>Minecraft Server Platform</p>
  <button class="btn" onclick="scrollToServers()">View Servers</button>
</section>

<h2 class="section-title">Server Nodes</h2>
<section class="servers" id="serverGrid"></section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="mName"></h3>
    <p id="mInfo"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

/* ===== SERVERS ===== */
const servers = [
  {name:"Server Node 1", ip:"mc.hypixel.net"},
  {name:"Server Node 2", ip:"mc.mineplex.com"},
  {name:"Server Node 3", ip:"play.example.com"},
  {name:"Server Node 4", ip:"localhost"},
  {name:"Server Node 5", ip:"test.server.net"}
];

/* ===== RENDER (SAFE) ===== */
function render(){
  const grid = document.getElementById("serverGrid");
  grid.innerHTML = "";

  servers.forEach(s => {

    const card = document.createElement("div");
    card.className = "card";

    card.onclick = () => openServer(s);

    card.innerHTML = `
      <img class="head" src="https://mc-heads.net/avatar/steve/64">

      <div>
        <div class="name">${s.name}</div>
        <div class="desc">${s.ip}</div>

        <div class="status">
          <div class="dot"></div>
          UNKNOWN
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

/* ===== MODAL ===== */
function openServer(server){
  document.getElementById("modal").style.display = "flex";

  document.getElementById("mName").innerText = server.name;

  document.getElementById("mInfo").innerHTML = `
    <b>IP:</b> ${server.ip}<br><br>
    <b>Status:</b> UNKNOWN ⚪<br>
    <b>Players:</b> ?/?<br><br>
    No real data (static mode)
  `;
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* ===== SCROLL ===== */
function scrollToServers(){
  document.getElementById("serverGrid").scrollIntoView({behavior:"smooth"});
}

/* ===== START ===== */
render();

</script>

</body>
</html>
